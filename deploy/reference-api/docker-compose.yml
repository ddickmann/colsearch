version: "3.8"

services:
  voyager-index:
    build:
      context: ../..
      dockerfile: deploy/reference-api/Dockerfile
    image: voyager-index:latest
    container_name: voyager-index
    ports:
      - "8080:8080"
    environment:
      VOYAGER_INDEX_PATH: /data/voyager-index
      HOST: 0.0.0.0
      PORT: 8080
      WORKERS: 4
    volumes:
      - voyager-index-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  voyager-index-data:
