name: nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  graph-qa-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable

      - name: Install native packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -e ".[dev,native-gem-build]"
          python -m pip install ./src/kernels/gem_router ./src/kernels/gem_index
          python -m pip install huggingface-hub

      - name: Cache MS MARCO dataset
        uses: actions/cache@v4
        with:
          path: ~/.cache/voyager-qa
          key: msmarco-doc-2k5-colbert-zero-v1

      - name: Run full Graph QA suite
        run: pytest tests/test_graph_qa_gates.py -v --tb=short

      - name: Run promotion gates
        run: python benchmarks/promotion_gates.py

      - name: Run unified eval harness
        run: |
          python -m benchmarks.full_eval_harness \
            --n_docs 2500 --dim 128 --vecs_per_doc 32 \
            --n_queries 100 --output benchmarks/results/nightly_eval.json

      - name: Generate Release QA Summary
        if: always()
        run: |
          python -c "
          import json, pathlib, datetime

          results = pathlib.Path('benchmarks/results')
          report_path = results / 'graph_qa_report.json'
          summary_lines = [
              '# Release QA Summary',
              f'**Date:** {datetime.datetime.now(datetime.timezone.utc).isoformat()}',
              '',
          ]
          if report_path.exists():
              report = json.loads(report_path.read_text())
              for section, data in report.items():
                  passed = data.get('passed', 'N/A')
                  summary_lines.append(f'- **{section}**: {\"PASS\" if passed else \"FAIL\"}')
          else:
              summary_lines.append('*No report generated*')

          summary_lines.append('')
          (results / 'release_qa_summary.md').write_text('\n'.join(summary_lines))
          print('\n'.join(summary_lines))
          "

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-qa-report
          path: |
            benchmarks/results/graph_qa_*.json
            benchmarks/results/graph_qa_report.json
            benchmarks/results/nightly_eval.json
            benchmarks/results/promotion_gates.json
            benchmarks/results/release_qa_summary.md
