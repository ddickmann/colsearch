name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and your proposed solution. The more context, the better.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific as possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why did you reject them?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, references, or screenshots.
